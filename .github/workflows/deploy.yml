name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger workflow on push to main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ChimeOut/package-lock.json
            CCG/package-lock.json

      - name: Install dependencies (ChimeOut)
        working-directory: ChimeOut
        run: npm ci

      - name: Build application (ChimeOut)
        working-directory: ChimeOut
        run: npm run build

      - name: Install dependencies (CCG)
        working-directory: CCG
        run: npm ci

      - name: Build application (CCG)
        working-directory: CCG
        run: npm run build

      - name: Prepare deployment directory structure
        run: |
          # Move ChimeOut build output to a temporary staging folder and clean up source files
          mv ChimeOut/dist ./chimeout-temp-dist
          rm -rf ChimeOut
          mkdir ChimeOut
          mv chimeout-temp-dist/* ChimeOut/
          rm -rf chimeout-temp-dist

          # Move CCG build output to a temporary staging folder and clean up source files
          mv CCG/dist ./ccg-temp-dist
          rm -rf CCG
          mkdir CCG
          mv ccg-temp-dist/* CCG/
          rm -rf ccg-temp-dist

      - name: Setup Pages configuration
        uses: actions/configure-pages@v4

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Upload the entire repository root (includes teams/ and compiled ChimeOut/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
