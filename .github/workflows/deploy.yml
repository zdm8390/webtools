name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger workflow on push to main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ChimeOut/package-lock.json

      - name: Install dependencies
        working-directory: ChimeOut
        run: npm ci

      - name: Build application
        working-directory: ChimeOut
        run: npm run build

      - name: Prepare deployment directory structure
        run: |
          # Move build output to a temporary staging folder
          mv ChimeOut/dist ./chimeout-temp-dist
          # Delete the ChimeOut source folder containing development files
          rm -rf ChimeOut
          # Recreate ChimeOut folder
          mkdir ChimeOut
          # Move the compiled production assets back into the ChimeOut folder
          mv chimeout-temp-dist/* ChimeOut/
          # Remove temp folder
          rm -rf chimeout-temp-dist

      - name: Setup Pages configuration
        uses: actions/configure-pages@v4

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Upload the entire repository root (includes teams/ and compiled ChimeOut/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
