<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チーム分けアプリ</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 100%; box-sizing: border-box; }
        .settings { background: #f0f0f0; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .btn { display: block; width: 100%; padding: 15px; background: #333; color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .btn:hover { background: #555; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        .team { flex: 1; padding: 15px; border-radius: 5px; min-height: 100px; }
        .team-red { background: #ffebee; border: 2px solid #ef5350; }
        .team-blue { background: #e3f2fd; border: 2px solid #42a5f5; }
        .team h3 { margin-top: 0; text-align: center; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { padding: 5px 0; border-bottom: 1px dashed #ccc; text-align: center; }
    </style>
</head>
<body>

    <h2>ランダムチーム分け</h2>

    <div class="input-grid" id="inputContainer">
        </div>

    <div class="settings">
        <label>
            <input type="checkbox" id="useCustomRatio"> 詳細設定：人数を偏らせる
        </label>
        <div id="ratioSettings" style="display: none; margin-top: 10px;">
            赤チームの人数: <input type="number" id="redCountInput" min="0" max="16" value="1"> 人
            <br><small style="color: #666;">※残りのメンバーは青チームになります。</small>
        </div>
    </div>

    <button class="btn" onclick="splitTeams()">チームを分ける！</button>

    <div class="results">
        <div class="team team-red">
            <h3 style="color: #ef5350;">赤チーム</h3>
            <ul id="redTeamList"></ul>
        </div>
        <div class="team team-blue">
            <h3 style="color: #42a5f5;">青チーム</h3>
            <ul id="blueTeamList"></ul>
        </div>
    </div>

    <script>
        // 1. 16個の入力欄を生成
        const container = document.getElementById('inputContainer');
        for (let i = 1; i <= 16; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = `メンバー ${i}`;
            input.className = 'member-input';
            container.appendChild(input);
        }

        // 2. 詳細設定の開閉
        const checkbox = document.getElementById('useCustomRatio');
        const ratioSettings = document.getElementById('ratioSettings');
        checkbox.addEventListener('change', (e) => {
            ratioSettings.style.display = e.target.checked ? 'block' : 'none';
        });

        // 3. 配列をシャッフルする関数（Fisher-Yatesアルゴリズム）
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 4. メインのチーム分け処理
        function splitTeams() {
            // 入力された名前を取得（空欄は除外）
            const inputs = document.querySelectorAll('.member-input');
            let members = Array.from(inputs).map(input => input.value.trim()).filter(val => val !== '');

            if (members.length === 0) {
                alert('メンバーを入力してください！');
                return;
            }

            // メンバーをランダムにシャッフル
            members = shuffleArray(members);

            const total = members.length;
            let redCount = 0;

            if (checkbox.checked) {
                // 詳細設定オンの場合：指定された人数を赤チームに
                const inputCount = parseInt(document.getElementById('redCountInput').value);
                // 入力人数が総人数を超えないように調整
                redCount = Math.min(inputCount, total); 
            } else {
                // デフォルト：同数に分ける
                const half = Math.floor(total / 2);
                if (total % 2 !== 0) {
                    // 奇数の場合、赤を多くするか青を多くするかをランダム(50%の確率)で決める
                    redCount = Math.random() < 0.5 ? half + 1 : half;
                } else {
                    redCount = half;
                }
            }

            // チームを分割
            const redTeam = members.slice(0, redCount);
            const blueTeam = members.slice(redCount);

            // 結果を画面に表示
            displayTeam('redTeamList', redTeam);
            displayTeam('blueTeamList', blueTeam);
        }

        // リストにメンバーを表示する関数
        function displayTeam(elementId, teamMembers) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = ''; // 一旦クリア
            teamMembers.forEach(member => {
                const li = document.createElement('li');
                li.textContent = member;
                ul.appendChild(li);
            });
            if (teamMembers.length === 0) {
                ul.innerHTML = '<li style="color:#aaa;">(なし)</li>';
            }
        }
    </script>
</body>
</html>
