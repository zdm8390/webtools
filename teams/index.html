<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格闘系杯チーム戦メイカー</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        h2 { text-align: center; } 
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 100%; box-sizing: border-box; }
        .settings { background: #f0f0f0; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .btn { display: block; width: 100%; padding: 15px; background: #333; color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .btn:hover { background: #555; }
        .btn-share { background: #4caf50; margin-top: 15px; } /* 共有ボタン用の緑色 */
        .btn-share:hover { background: #388e3c; }
        .btn-reset { background: #9e9e9e; margin-top: 15px; } /* 新しく作るボタン用のグレー */
        .btn-reset:hover { background: #757575; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        .team { flex: 1; padding: 15px; border-radius: 5px; min-height: 100px; }
        .team-red { background: #ffebee; border: 2px solid #ef5350; }
        .team-blue { background: #e3f2fd; border: 2px solid #42a5f5; }
        .team h3 { margin-top: 0; text-align: center; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { padding: 5px 0; border-bottom: 1px dashed #ccc; text-align: left; padding-left: 10px; }
        .team-red li { color: #d32f2f; font-weight: bold; }
        .team-blue li { color: #1976d2; font-weight: bold; }
        
        /* コピー完了メッセージ */
        #copyMessage { color: #4caf50; font-weight: bold; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 id="mainTitle">格闘系杯チーム戦メイカー</h2>

    <div id="inputSection">
        <div class="input-grid" id="inputContainer">
            </div>

        <div class="settings">
            <label>
                <input type="checkbox" id="useCustomRatio"> 詳細設定：人数を偏らせる
            </label>
            <div id="ratioSettings" style="display: none; margin-top: 10px;">
                TeamRedの人数: <input type="number" id="redCountInput" min="0" max="16" value="1"> 人
                <br><small style="color: #666;">※残りのメンバーはTeamBlueになります。</small>
            </div>
        </div>

        <button class="btn" onclick="splitTeams()">チームを分ける！</button>
    </div>

    <div class="results">
        <div class="team team-red">
            <h3 style="color: #ef5350;">TeamRed</h3>
            <ul id="redTeamList"></ul>
        </div>
        <div class="team team-blue">
            <h3 style="color: #42a5f5;">TeamBlue</h3>
            <ul id="blueTeamList"></ul>
        </div>
    </div>

    <div id="shareSection" style="display: none;">
        <button class="btn btn-share" onclick="copyShareUrl()">🔗 この結果の共有用URLをコピー</button>
        <p id="copyMessage">コピーしました！LINE等に貼り付けてください。</p>
        
        <button class="btn btn-reset" id="resetButton" style="display: none;" onclick="location.href=location.pathname">最初からやり直す</button>
    </div>

    <script>
        // --- 初期設定とモード判定 ---
        const urlParams = new URLSearchParams(window.location.search);
        const rParam = urlParams.get('r'); // URLから赤チームを取得
        const bParam = urlParams.get('b'); // URLから青チームを取得

        let currentShareUrl = '';

        if (rParam !== null || bParam !== null) {
            // 【共有モード】URLに結果が含まれている場合
            document.getElementById('inputSection').style.display = 'none'; // 入力欄を隠す
            document.getElementById('mainTitle').textContent = '共有されたチーム分け結果';
            document.getElementById('shareSection').style.display = 'block';
            document.querySelector('.btn-share').style.display = 'none'; // 共有画面でさらに共有ボタンは不要なので隠す
            document.getElementById('resetButton').style.display = 'block'; // やり直しボタンを表示

            // URLの文字列をカンマで区切って配列に戻す
            const redTeam = rParam ? rParam.split(',') : [];
            const blueTeam = bParam ? bParam.split(',') : [];

            displayTeam('redTeamList', redTeam);
            displayTeam('blueTeamList', blueTeam);
        } else {
            // 【通常モード】普通に開いた場合
            // 1. 16個の入力欄を生成
            const container = document.getElementById('inputContainer');
            for (let i = 1; i <= 16; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = `メンバー ${i}`;
                input.className = 'member-input';
                container.appendChild(input);
            }

            // 2. 詳細設定の開閉
            const checkbox = document.getElementById('useCustomRatio');
            const ratioSettings = document.getElementById('ratioSettings');
            checkbox.addEventListener('change', (e) => {
                ratioSettings.style.display = e.target.checked ? 'block' : 'none';
            });
        }

        // 3. 配列をシャッフルする関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 4. メインのチーム分け処理
        function splitTeams() {
            const inputs = document.querySelectorAll('.member-input');
            let members = Array.from(inputs).map(input => input.value.trim()).filter(val => val !== '');

            if (members.length === 0) {
                alert('メンバーを入力してください！');
                return;
            }

            members = shuffleArray(members);

            const total = members.length;
            let redCount = 0;

            if (document.getElementById('useCustomRatio').checked) {
                const inputCount = parseInt(document.getElementById('redCountInput').value);
                redCount = Math.min(inputCount, total); 
            } else {
                const half = Math.floor(total / 2);
                if (total % 2 !== 0) {
                    redCount = Math.random() < 0.5 ? half + 1 : half;
                } else {
                    redCount = half;
                }
            }

            const redTeam = members.slice(0, redCount);
            const blueTeam = members.slice(redCount);

            displayTeam('redTeamList', redTeam);
            displayTeam('blueTeamList', blueTeam);

            // 🌟 共有用URLの生成処理
            const baseUrl = window.location.origin + window.location.pathname;
            const params = new URLSearchParams();
            if (redTeam.length > 0) params.append('r', redTeam.join(','));
            if (blueTeam.length > 0) params.append('b', blueTeam.join(','));
            
            currentShareUrl = `${baseUrl}?${params.toString()}`;
            
            // 共有ボタンを表示
            document.getElementById('shareSection').style.display = 'block';
            document.getElementById('copyMessage').style.display = 'none'; // メッセージをリセット
        }

        // リストにメンバーを表示する関数
        function displayTeam(elementId, teamMembers) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = ''; 
            
            if (teamMembers.length === 0) {
                ul.innerHTML = '<li style="color:#aaa; text-align:center; font-weight:normal;">(なし)</li>';
                return;
            }

            teamMembers.forEach((member, index) => {
                const li = document.createElement('li');
                li.textContent = `${index + 1}. ${member}`;
                ul.appendChild(li);
            });
        }

        // 🌟 クリップボードにURLをコピーする処理
        function copyShareUrl() {
            navigator.clipboard.writeText(currentShareUrl).then(() => {
                const msg = document.getElementById('copyMessage');
                msg.style.display = 'block';
                // 3秒後にメッセージを消す
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            }).catch(err => {
                alert('コピーに失敗しました。URLバーから直接コピーしてください。');
            });
        }
    </script>
</body>
</html>
