# テトリスン - ストーリー会話劇定義ファイル (YAML)

easy:
  - stage: 1
    enemy: inuwan
    title: "Stage 1: 元気いっぱい！イヌワン"
    dialogue:
      - speaker: "p1"
        text: "いよいよ魔法テトリス大会の始まりだね！がんばるぞー！"
      - speaker: "enemy"
        text: "バウバウ！ボクはイヌワンだワン！ぼくの『カエシテク・アタック』はお邪魔ブロックを全部返すワン！"
      - speaker: "p1"
        text: "頼もしい魔法だね！でも負けないよ、勝負だ！"

  - stage: 2
    enemy: torichun
    title: "Stage 2: お空の歌姫 トリチュン"
    dialogue:
      - speaker: "p1"
        text: "トリチュンちゃん、次の対戦相手は君だね！"
      - speaker: "enemy"
        text: "ピーチクパーチク♪ わたしの『ピーチクテイル』で上のブロックをキレイにお掃除しちゃうよ！"
      - speaker: "p1"
        text: "パステルなお空の魔法、受けて立つよ！"

  - stage: 3
    enemy: tanupon
    title: "Final Stage: いたずらタヌキ タヌポン"
    dialogue:
      - speaker: "enemy"
        text: "ポンポコリン！ボクのドロンコ魔法で盤面をぐちゃぐちゃ…じゃなくてリセットしちゃうポン！"
      - speaker: "p1"
        text: "『ドロンコ・リセット』！？お互いの盤面が空になっちゃうなんて大逆転の予感！"
      - speaker: "enemy"
        text: "さあ、最終決戦ポン！負けないポンよー！"

normal:
  - stage: 1
    enemy: inuwan
    title: "Stage 1: 忠誠の戦士 イヌワン"
    dialogue:
      - speaker: "enemy"
        text: "ワンワン！ここからはノーマルモードだワン！気を引き締めるワン！"
      - speaker: "p1"
        text: "イヌワンの魔法は相殺と相性バツグンだから警戒しなきゃ！"

  - stage: 2
    enemy: torichun
    title: "Stage 2: 疾風の羽ばたき トリチュン"
    dialogue:
      - speaker: "enemy"
        text: "パタパタ♪ 上段3行を消し去る翼の舞、見せてあげるね！"
      - speaker: "p1"
        text: "ピンチの時ほど力を発揮する魔法だね！真っ向勝負だ！"

  - stage: 3
    enemy: sarukkey
    title: "Stage 3: お調子者 サルウッキー"
    dialogue:
      - speaker: "enemy"
        text: "ウッキッキー！おいらの『ウッキッキー・スクエア』はO型ブロックが3回連続で降ってくるウキ！"
      - speaker: "p1"
        text: "四角いブロックは積みやすいけど穴を残さないように気をつけなきゃ！"

  - stage: 4
    enemy: kitsunekon
    title: "Stage 4: 幻術師 キツネコン"
    dialogue:
      - speaker: "enemy"
        text: "コンコン…我が『トリック・チェンジ』はお互いの盤面を入れ替える魅惑の術コン…"
      - speaker: "p1"
        text: "自分が有利になっても油断できない！？すごい入れ替え魔法だ…！"

  - stage: 5
    enemy: dragogon
    title: "Final Stage: 覇王 ドラゴゴン"
    dialogue:
      - speaker: "enemy"
        text: "グォォォ！我が名はドラゴゴン！『ドラゴン・ブレス』で下部5行を一気に吹き飛ばす！"
      - speaker: "p1"
        text: "圧倒的な破壊力…！でも諦めない、これが魔法テトリスンの覇者への道だ！"

hard:
  - stage: 1
    enemy: nekonya
    title: "Stage 1: 気まぐれネコ ネコニャー"
    dialogue:
      - speaker: "enemy"
        text: "ニャン！ハードモードの開幕ニャ！奇数行を消す『気まぐれアタック』で翻弄するニャ！"
      - speaker: "p1"
        text: "奇数行ランダム消去は読めない動きになりそうだね！"

  - stage: 2
    enemy: inuwan
    title: "Stage 2: 鉄壁 イヌワン"
    dialogue:
      - speaker: "enemy"
        text: "ハードのボクは隙がないワン！お邪魔返しで返り討ちだワン！"

  - stage: 3
    enemy: torichun
    title: "Stage 3: 蒼空 トリチュン"
    dialogue:
      - speaker: "enemy"
        text: "ピーッ！超スピードでブロックを積み上げちゃうよ！"

  - stage: 4
    enemy: sarukkey
    title: "Stage 4: 申王 サルウッキー"
    dialogue:
      - speaker: "enemy"
        text: "ウッキー！四角テトリミノの嵐に耐えられるウキ！？"

  - stage: 5
    enemy: tanupon
    title: "Stage 5: 変化 タヌポン"
    dialogue:
      - speaker: "enemy"
        text: "ポンポコ！危機一髪のドロンコリセット発動だポン！"

  - stage: 6
    enemy: kitsunekon
    title: "Stage 6: 九尾 キツネコン"
    dialogue:
      - speaker: "enemy"
        text: "コンコン…最高難易度の入れ替え術、見切れるかしらコン？"

  - stage: 7
    enemy: dragogon
    title: "Final Stage: 究極神竜 ドラゴゴン"
    dialogue:
      - speaker: "enemy"
        text: "グォォォォ！全力を解き放つ！ドラゴンブレスの炎に包まれよ！"
      - speaker: "p1"
        text: "これがハードモード最後の戦い！すべての魔法と技を込めて…いざ勝負！"
