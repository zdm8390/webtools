<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Diff Studio | コピペで簡単テキスト差分比較ツール</title>
    <meta name="description" content="2つのテキストをコピペして「比較実行」を押すだけ！行単位・文字単位の差分をハイライト表示する高速Web Diffツール。" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Share+Tech+Mono&family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.12);
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --diff-add-bg: rgba(16, 185, 129, 0.18);
            --diff-add-text: #34d399;
            --diff-del-bg: rgba(239, 68, 68, 0.18);
            --diff-del-text: #f87171;
            --diff-mod-bg: rgba(245, 158, 11, 0.18);
            
            --font-sans: 'Outfit', 'M PLUS 1p', -apple-system, sans-serif;
            --font-mono: 'Share Tech Mono', 'Consolas', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(rgba(59, 130, 246, 0.12) 1px, transparent 1px),
                radial-gradient(rgba(59, 130, 246, 0.12) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 6px 10px;
            border-radius: 10px;
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #6366f1);
            border: none;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            font-size: 0.95rem;
            padding: 10px 24px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover), #4f46e5);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .container {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Toolbar Controls */
        .toolbar {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        select, input[type="checkbox"] {
            cursor: pointer;
        }

        select {
            background: #1e293b;
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Input Grid Area */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .input-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-title {
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        textarea {
            width: 100%;
            height: 280px;
            background: #090d16;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #e2e8f0;
            font-family: var(--font-mono);
            font-size: 0.88rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        /* Diff Result Section */
        .result-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 14px;
        }

        .diff-stats {
            display: flex;
            gap: 16px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .stat-add { color: var(--diff-add-text); font-weight: bold; }
        .stat-del { color: var(--diff-del-text); font-weight: bold; }
        .stat-same { color: var(--text-muted); }

        /* Diff Output Viewer */
        .diff-output {
            font-family: var(--font-mono);
            font-size: 0.88rem;
            line-height: 1.6;
            background: #090d16;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        .diff-table {
            width: 100%;
            border-collapse: collapse;
        }

        .diff-row {
            display: flex;
        }

        .diff-num {
            width: 45px;
            padding: 2px 8px;
            color: #475569;
            text-align: right;
            user-select: none;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        .diff-content {
            padding: 2px 12px;
            white-space: pre-wrap;
            word-break: break-all;
            flex: 1;
        }

        /* Diff Row Types */
        .row-add {
            background: var(--diff-add-bg);
            color: var(--diff-add-text);
        }

        .row-del {
            background: var(--diff-del-bg);
            color: var(--diff-del-text);
        }

        .row-same {
            color: #cbd5e1;
        }

        .inline-add {
            background: rgba(16, 185, 129, 0.4);
            border-radius: 3px;
            padding: 0 2px;
            font-weight: bold;
        }

        .inline-del {
            background: rgba(239, 68, 68, 0.4);
            border-radius: 3px;
            padding: 0 2px;
            text-decoration: line-through;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 868px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <span class="brand-icon">🔄</span>
            <div>
                <div class="brand-title">Text Diff Studio</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">テキスト差分比較ツール</div>
            </div>
        </div>
        <div class="header-actions">
            <button id="sample-btn" class="btn">📝 サンプル読み込み</button>
            <button id="clear-btn" class="btn">🗑️ 入力をクリア</button>
            <a href="../" class="btn">🏠 ポータルへ戻る</a>
        </div>
    </header>

    <div class="container">
        
        <!-- Toolbar & Options -->
        <div class="toolbar">
            <div class="tool-group">
                <span class="control-label">比較モード:</span>
                <select id="diff-mode">
                    <option value="line">行単位 (Line Diff)</option>
                    <option value="word">単語・文字単位 (Word Diff)</option>
                </select>

                <label class="checkbox-label">
                    <input type="checkbox" id="opt-ignore-space" checked> 前後の空白を無視
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="opt-ignore-case"> 大文字・小文字を無視
                </label>
            </div>

            <button id="compare-btn" class="btn btn-primary">⚡ 比較実行 (Compare)</button>
        </div>

        <!-- Input Textareas Grid -->
        <div class="input-grid">
            <!-- Left Input: Original -->
            <div class="input-box">
                <div class="input-header">
                    <span class="input-title">👈 変更前 (Original / Before)</span>
                    <span id="stat-left" class="stat-badge">0 行 / 0 文字</span>
                </div>
                <textarea id="text-left" placeholder="変更前のテキストをコピペしてください..."></textarea>
            </div>

            <!-- Right Input: Modified -->
            <div class="input-box">
                <div class="input-header">
                    <span class="input-title">👉 変更後 (Modified / After)</span>
                    <span id="stat-right" class="stat-badge">0 行 / 0 文字</span>
                </div>
                <textarea id="text-right" placeholder="変更後のテキストをコピペしてください..."></textarea>
            </div>
        </div>

        <!-- Diff Result Display -->
        <div class="result-section">
            <div class="result-header">
                <h3>📊 比較結果 (Diff Output)</h3>
                <div class="diff-stats">
                    <span class="stat-add" id="res-add">+0 行追加</span>
                    <span class="stat-del" id="res-del">-0 行削除</span>
                    <span class="stat-same" id="res-same">0 行一致</span>
                </div>
            </div>

            <div class="diff-output" id="diff-output-container">
                <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                    上記の2つのテキストエリアに文章をコピペして「⚡ 比較実行」を押してください。
                </div>
            </div>
        </div>

    </div>

    <footer>
        Text Diff Studio | zdm8390/webtools
    </footer>

    <!-- Diff Engine Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textLeft = document.getElementById('text-left');
            const textRight = document.getElementById('text-right');
            const compareBtn = document.getElementById('compare-btn');
            const clearBtn = document.getElementById('clear-btn');
            const sampleBtn = document.getElementById('sample-btn');
            
            const diffModeSelect = document.getElementById('diff-mode');
            const optIgnoreSpace = document.getElementById('opt-ignore-space');
            const optIgnoreCase = document.getElementById('opt-ignore-case');
            
            const statLeft = document.getElementById('stat-left');
            const statRight = document.getElementById('stat-right');
            const diffOutput = document.getElementById('diff-output-container');
            
            const resAdd = document.getElementById('res-add');
            const resDel = document.getElementById('res-del');
            const resSame = document.getElementById('res-same');

            // Text Stats Update
            function updateInputStats() {
                const valL = textLeft.value;
                const valR = textRight.value;
                
                const linesL = valL ? valL.split('\n').length : 0;
                const linesR = valR ? valR.split('\n').length : 0;
                
                statLeft.textContent = `${linesL} 行 / ${valL.length} 文字`;
                statRight.textContent = `${linesR} 行 / ${valR.length} 文字`;
            }

            textLeft.addEventListener('input', updateInputStats);
            textRight.addEventListener('input', updateInputStats);

            // Sample Data
            sampleBtn.addEventListener('click', () => {
                textLeft.value = `// User Controller Profile
function getUserProfile(userId) {
    const user = Database.findUser(userId);
    if (!user) {
        return { status: 404, message: "User not found" };
    }
    return {
        id: user.id,
        name: user.name,
        email: user.email,
        role: "guest"
    };
}`;

                textRight.value = `// User Controller Profile (Updated)
function getUserProfile(userId) {
    if (!userId) throw new Error("Invalid User ID");
    const user = Database.findUser(userId);
    if (!user) {
        return { status: 404, message: "User not found" };
    }
    return {
        id: user.id,
        name: user.name,
        email: user.email,
        role: "admin",
        updatedAt: new Date().toISOString()
    };
}`;
                updateInputStats();
                executeDiff();
            });

            // Clear Input
            clearBtn.addEventListener('click', () => {
                textLeft.value = '';
                textRight.value = '';
                updateInputStats();
                diffOutput.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">テキストをクリアしました。</div>';
                resAdd.textContent = '+0 追加';
                resDel.textContent = '-0 削除';
                resSame.textContent = '0 一致';
            });

            // LCS Diff Algorithm Implementation
            function computeLCS(arr1, arr2, preprocessFn) {
                const m = arr1.length;
                const n = arr2.length;
                const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

                for (let i = 1; i <= m; i++) {
                    for (let j = 1; j <= n; j++) {
                        if (preprocessFn(arr1[i - 1]) === preprocessFn(arr2[j - 1])) {
                            dp[i][j] = dp[i - 1][j - 1] + 1;
                        } else {
                            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                        }
                    }
                }

                // Backtrack to find diff ops
                let i = m, j = n;
                const result = [];
                while (i > 0 || j > 0) {
                    if (i > 0 && j > 0 && preprocessFn(arr1[i - 1]) === preprocessFn(arr2[j - 1])) {
                        result.unshift({ type: 'same', val1: arr1[i - 1], val2: arr2[j - 1] });
                        i--; j--;
                    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                        result.unshift({ type: 'add', val: arr2[j - 1] });
                        j--;
                    } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                        result.unshift({ type: 'del', val: arr1[i - 1] });
                        i--;
                    }
                }
                return result;
            }

            function preprocess(str) {
                let res = str;
                if (optIgnoreSpace.checked) res = res.trim();
                if (optIgnoreCase.checked) res = res.toLowerCase();
                return res;
            }

            // Execute Diff Computation
            function executeDiff() {
                const mode = diffModeSelect.value;
                const valL = textLeft.value;
                const valR = textRight.value;

                if (!valL && !valR) {
                    diffOutput.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">テキストが入力されていません。</div>';
                    return;
                }

                if (mode === 'line') {
                    const linesL = valL.split('\n');
                    const linesR = valR.split('\n');
                    const diffs = computeLCS(linesL, linesR, preprocess);
                    renderLineDiff(diffs);
                } else {
                    // Word / Char Mode
                    const wordsL = valL.split(/(\s+|\b)/);
                    const wordsR = valR.split(/(\s+|\b)/);
                    const diffs = computeLCS(wordsL, wordsR, preprocess);
                    renderInlineDiff(diffs);
                }
            }

            // Render Line Diff Output
            function renderLineDiff(diffs) {
                let html = '<table class="diff-table">';
                let countAdd = 0, countDel = 0, countSame = 0;
                let lineL = 1, lineR = 1;

                diffs.forEach(d => {
                    if (d.type === 'same') {
                        countSame++;
                        html += `
                            <tr class="diff-row row-same">
                                <td class="diff-num">${lineL++}</td>
                                <td class="diff-num">${lineR++}</td>
                                <td class="diff-content">  ${escapeHtml(d.val1)}</td>
                            </tr>`;
                    } else if (d.type === 'add') {
                        countAdd++;
                        html += `
                            <tr class="diff-row row-add">
                                <td class="diff-num"></td>
                                <td class="diff-num">${lineR++}</td>
                                <td class="diff-content">+ ${escapeHtml(d.val)}</td>
                            </tr>`;
                    } else if (d.type === 'del') {
                        countDel++;
                        html += `
                            <tr class="diff-row row-del">
                                <td class="diff-num">${lineL++}</td>
                                <td class="diff-num"></td>
                                <td class="diff-content">- ${escapeHtml(d.val)}</td>
                            </tr>`;
                    }
                });

                html += '</table>';
                diffOutput.innerHTML = html;

                resAdd.textContent = `+${countAdd} 行追加`;
                resDel.textContent = `-${countDel} 行削除`;
                resSame.textContent = `${countSame} 行一致`;
            }

            // Render Inline Word Diff Output
            function renderInlineDiff(diffs) {
                let html = '<div style="padding: 16px;">';
                let countAdd = 0, countDel = 0, countSame = 0;

                diffs.forEach(d => {
                    if (d.type === 'same') {
                        countSame++;
                        html += `<span>${escapeHtml(d.val1)}</span>`;
                    } else if (d.type === 'add') {
                        countAdd++;
                        html += `<span class="inline-add">${escapeHtml(d.val)}</span>`;
                    } else if (d.type === 'del') {
                        countDel++;
                        html += `<span class="inline-del">${escapeHtml(d.val)}</span>`;
                    }
                });

                html += '</div>';
                diffOutput.innerHTML = html;

                resAdd.textContent = `+${countAdd} 単語追加`;
                resDel.textContent = `-${countDel} 単語削除`;
                resSame.textContent = `${countSame} 単語一致`;
            }

            function escapeHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            compareBtn.addEventListener('click', executeDiff);
        });
    </script>
</body>
</html>
