<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンタースタジオ | Char Counter Studio</title>
    <meta name="description" content="貼り付け＆ファイルアップロード対応の高速文字数リアルタイム計測ツール！空白・改行の有無、原稿用紙枚数、読了時間をワンクリック切替。" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 27, 44, 0.88);
            --card-border: rgba(226, 232, 240, 0.12);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-gold: #f59e0b;
            --accent-purple: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #090d16;
            
            --font-sans: 'Outfit', 'Noto Sans JP', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(rgba(59, 130, 246, 0.08) 1.5px, transparent 1.5px),
                radial-gradient(rgba(59, 130, 246, 0.08) 1.5px, transparent 1.5px);
            background-size: 28px 28px;
            background-position: 0 0, 14px 14px;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .container {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Hero Results Display Banner */
        .hero-banner {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .main-stat-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .main-stat-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .main-stat-value {
            font-size: 3.5rem;
            font-weight: 900;
            font-family: var(--font-mono);
            color: var(--accent-gold);
            line-height: 1;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .unit { font-size: 1.2rem; margin-left: 4px; color: var(--text-main); font-family: var(--font-sans); }

        /* One-Click Calculation Mode Switch Chips */
        .mode-switch-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px dashed rgba(255, 255, 255, 0.12);
            padding-top: 16px;
        }

        .mode-chip {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .mode-chip:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
            color: white;
        }

        .mode-chip.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        /* Detailed Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .metric-value {
            font-size: 1.35rem;
            font-weight: 800;
            font-family: var(--font-mono);
            color: var(--accent-green);
        }

        /* Input Area & Drag & Drop Overlay */
        .input-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .drop-zone {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 320px;
            background: var(--input-bg);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 16px;
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 1rem;
            line-height: 1.7;
            outline: none;
            resize: vertical;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent-blue);
            border-style: solid;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea.drag-over {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.05);
        }

        .file-upload-input {
            display: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <span class="brand-icon">📏</span>
            <div>
                <div class="brand-title">文字数カウンタースタジオ</div>
                <div style="font-size: 0.72rem; color: var(--text-muted);">Char Counter Studio</div>
            </div>
        </div>
        <div class="header-actions">
            <a href="../" class="btn">🏠 ポータルへ戻る</a>
        </div>
    </header>

    <div class="container">
        
        <!-- Hero Dynamic Metric Result Display Banner -->
        <div class="hero-banner">
            <div class="main-stat-wrap">
                <div>
                    <div id="stat-label" class="main-stat-label">全文字数 (空白・改行を含む)</div>
                    <div class="main-stat-value"><span id="main-count">0</span><span class="unit">文字</span></div>
                </div>

                <button id="copy-result-btn" class="btn btn-primary">📋 計測結果をコピー</button>
            </div>

            <!-- Mode Switch Chips (One-Click Mode Switcher) -->
            <div class="mode-switch-chips">
                <button class="mode-chip active" data-mode="all">
                    <span>全文字数 (空白・改行含)</span>
                </button>
                <button class="mode-chip" data-mode="no-space">
                    <span>空白を除く文字数</span>
                </button>
                <button class="mode-chip" data-mode="no-break">
                    <span>改行を除く文字数</span>
                </button>
                <button class="mode-chip" data-mode="no-both">
                    <span>空白・改行を両方除く</span>
                </button>
                <button class="mode-chip" data-mode="words">
                    <span>単語数 (Words)</span>
                </button>
            </div>
        </div>

        <!-- Detailed Metrics Grid Breakdown -->
        <div class="metrics-grid">
            <div class="metric-card">
                <span class="metric-label">全文字数 (標準)</span>
                <span id="metric-all" class="metric-value">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">空白除外</span>
                <span id="metric-no-space" class="metric-value">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">改行除外</span>
                <span id="metric-no-break" class="metric-value">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">行数 (Lines)</span>
                <span id="metric-lines" class="metric-value">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">段落数 (Paragraphs)</span>
                <span id="metric-paragraphs" class="metric-value">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">原稿用紙 (400字詰)</span>
                <span id="metric-manuscript" class="metric-value">0 枚</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">読了目安時間 (約500字/分)</span>
                <span id="metric-reading-time" class="metric-value" style="color: var(--accent-purple);">0分0秒</span>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-card">
            <div class="input-header">
                <span style="font-size: 0.9rem; font-weight: 800; color: var(--text-main);">
                    ✏️ テキスト入力領域 <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: normal;">(テキストファイルをドラッグ＆ドロップでも読み込めます)</span>
                </span>
                <div class="input-actions">
                    <button id="paste-btn" class="btn">📋 クリップボードから貼り付け</button>
                    <button id="upload-btn" class="btn">📁 ファイル選択</button>
                    <button id="clear-btn" class="btn" style="color: #f87171;">🗑️ 全消去</button>
                    <input type="file" id="file-input" class="file-upload-input" accept=".txt,.md,.csv,.json,.js,.html,.css">
                </div>
            </div>

            <div class="drop-zone">
                <textarea id="text-input" placeholder="ここに文章を貼り付けるか、テキストファイルをドラッグ＆ドロップしてください..."></textarea>
            </div>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">コピーしました！</div>

    <footer>
        文字数カウンタースタジオ | zdm8390/webtools
    </footer>

    <!-- Counter Logic Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textInput = document.getElementById('text-input');
            const mainCount = document.getElementById('main-count');
            const statLabel = document.getElementById('stat-label');
            const modeChips = document.querySelectorAll('.mode-chip');

            const metricAll = document.getElementById('metric-all');
            const metricNoSpace = document.getElementById('metric-no-space');
            const metricNoBreak = document.getElementById('metric-no-break');
            const metricLines = document.getElementById('metric-lines');
            const metricParagraphs = document.getElementById('metric-paragraphs');
            const metricManuscript = document.getElementById('metric-manuscript');
            const metricReadingTime = document.getElementById('metric-reading-time');

            const pasteBtn = document.getElementById('paste-btn');
            const uploadBtn = document.getElementById('upload-btn');
            const clearBtn = document.getElementById('clear-btn');
            const copyResultBtn = document.getElementById('copy-result-btn');
            const fileInput = document.getElementById('file-input');
            const toast = document.getElementById('toast');

            let currentMode = 'all';

            // Mode Chip Selection Event
            modeChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    modeChips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentMode = chip.getAttribute('data-mode');
                    updateCounts();
                });
            });

            // Input Event Listener
            textInput.addEventListener('input', updateCounts);

            // Drag and Drop File Reading
            textInput.addEventListener('dragover', (e) => {
                e.preventDefault();
                textInput.classList.add('drag-over');
            });

            textInput.addEventListener('dragleave', () => {
                textInput.classList.remove('drag-over');
            });

            textInput.addEventListener('drop', (e) => {
                e.preventDefault();
                textInput.classList.remove('drag-over');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    readFile(e.dataTransfer.files[0]);
                }
            });

            // File Upload Trigger
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    readFile(e.target.files[0]);
                }
            });

            function readFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    textInput.value = e.target.result;
                    updateCounts();
                };
                reader.readAsText(file);
            }

            // Clipboard Paste
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    textInput.value = text;
                    updateCounts();
                    showToast('クリップボードから貼り付けました');
                } catch (err) {
                    alert('クリップボードの読み取り権限が拒否されました。手動で貼り付けてください。');
                }
            });

            // Clear Input
            clearBtn.addEventListener('click', () => {
                textInput.value = '';
                updateCounts();
                textInput.focus();
            });

            // Copy Results
            copyResultBtn.addEventListener('click', () => {
                const rawText = textInput.value;
                const counts = calculateMetrics(rawText);
                const summary = `【文字数計測結果】\n・全文字数: ${counts.all.toLocaleString()}文字\n・空白除外: ${counts.noSpace.toLocaleString()}文字\n・改行除外: ${counts.noBreak.toLocaleString()}文字\n・単語数: ${counts.words.toLocaleString()} words\n・行数: ${counts.lines.toLocaleString()}行\n・原稿用紙換算: ${counts.manuscript}枚\n・読了時間目安: ${counts.readingTimeStr}\n(文字数カウンタースタジオ by zdm8390/webtools)`;

                navigator.clipboard.writeText(summary).then(() => {
                    showToast('結果をクリップボードにコピーしました！');
                });
            });

            function updateCounts() {
                const text = textInput.value;
                const m = calculateMetrics(text);

                // Update Hero Primary Counter according to active mode
                if (currentMode === 'all') {
                    statLabel.textContent = '全文字数 (空白・改行を含む)';
                    mainCount.textContent = m.all.toLocaleString();
                } else if (currentMode === 'no-space') {
                    statLabel.textContent = '文字数 (空白を除く)';
                    mainCount.textContent = m.noSpace.toLocaleString();
                } else if (currentMode === 'no-break') {
                    statLabel.textContent = '文字数 (改行を除く)';
                    mainCount.textContent = m.noBreak.toLocaleString();
                } else if (currentMode === 'no-both') {
                    statLabel.textContent = '文字数 (空白・改行の両方を除く)';
                    mainCount.textContent = m.noBoth.toLocaleString();
                } else if (currentMode === 'words') {
                    statLabel.textContent = '単語数 (Words)';
                    mainCount.textContent = m.words.toLocaleString();
                }

                // Update Detailed Metrics Grid
                metricAll.textContent = m.all.toLocaleString();
                metricNoSpace.textContent = m.noSpace.toLocaleString();
                metricNoBreak.textContent = m.noBreak.toLocaleString();
                metricLines.textContent = m.lines.toLocaleString();
                metricParagraphs.textContent = m.paragraphs.toLocaleString();
                metricManuscript.textContent = `${m.manuscript} 枚`;
                metricReadingTime.textContent = m.readingTimeStr;
            }

            function calculateMetrics(text) {
                if (!text) {
                    return {
                        all: 0, noSpace: 0, noBreak: 0, noBoth: 0,
                        words: 0, lines: 0, paragraphs: 0, manuscript: 0, readingTimeStr: '0分0秒'
                    };
                }

                const all = text.length;
                const noSpace = text.replace(/[\s\t]/g, '').length;
                const noBreak = text.replace(/[\r\n]/g, '').length;
                const noBoth = text.replace(/\s/g, '').length;

                // Word count (English & Japanese whitespace splitting)
                const words = text.trim() ? text.trim().split(/\s+/).length : 0;

                // Line count
                const lines = text.split('\n').length;

                // Paragraph count
                const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;

                // 400-character Genko Yoshi Manuscript pages
                const manuscript = (all === 0) ? 0 : Math.ceil(all / 400);

                // Reading time (approx 500 characters per minute)
                const totalSeconds = Math.ceil((all / 500) * 60);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const readingTimeStr = `${minutes}分${seconds}秒`;

                return {
                    all, noSpace, noBreak, noBoth, words, lines, paragraphs, manuscript, readingTimeStr
                };
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // Initial Count
            updateCounts();
        });
    </script>
</body>
</html>
